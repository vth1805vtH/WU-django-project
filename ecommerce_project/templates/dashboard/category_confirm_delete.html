{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                <h4 class="mb-3">Delete Category</h4>
                <p class="mb-1">Are you sure you want to delete <strong>"{{ category.name }}"</strong>?</p>
                <p class="text-muted small">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>
                        <a href="{% url 'dashboard:category_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
